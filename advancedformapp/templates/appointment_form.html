<!DOCTYPE html>
<html>
<head>
    <title>Appointment Form</title>
</head>
<body>

<h2>Appointment Form</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Name:</label><input type="text" name="name"><br><br>

    <label>Gender:</label>
    <select name="gender">
        <option value="">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select><br><br>

    <label>Hobbies:</label><input type="text" name="hobbies"><br><br>

    <label>Appointment Date & Time:</label><input type="datetime-local" name="appointment_datetime"><br><br>

    <label>Country:</label><input type="text" name="country"><br><br>

    <label>Resume:</label><input type="file" name="resume"><br><br>

    <label>Email:</label><input type="text" name="email"><br><br>

    <label>Phone:</label><input type="text" name="phone"><br><br>

    <label>Password:</label><input type="password" name="password"><br><br>

    <label>Confirm Password:</label><input type="password" name="confirm_password"><br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
